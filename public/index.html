<!DOCTYPE html>
<html>
<head>
  <title>Maxim Ride Viewer</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    .card { background: white; padding: 10px; margin: 10px 0; border-radius: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    input { margin: 5px; padding: 5px; display: block; }
  </style>
</head>
<body>

<h1>🚕 Maxim Ride Viewer</h1>

<!-- DRIVERS -->
<h3>Drivers</h3>
<button onclick="loadDrivers()">Load Drivers</button>
<div id="drivers"></div>

<h3>Add Driver</h3>
<input id="name" placeholder="Name">
<input id="vehicle" placeholder="Vehicle">
<button onclick="addDriver()">Add</button>

<!-- BOOK RIDE -->
<h3>Book Ride</h3>
<input id="rider" placeholder="Rider Name">
<input id="pickup" placeholder="Pickup">
<input id="dropoff" placeholder="Dropoff">
<input id="driverId" placeholder="Driver ID">
<button onclick="bookRide()">Book</button>

<!-- RIDES -->
<h3>Rides</h3>
<button onclick="loadRides()">Load Rides</button>
<div id="rides"></div>

<script>
// ✅ IMPORTANT: works locally AND on Render
const API = "";

// =====================
// LOAD DRIVERS
// =====================
function loadDrivers() {
  fetch(`${API}/drivers`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("drivers").innerHTML = data.map(d => `
        <div class="card">
          <b>${d.driverName}</b> (${d.vehicle}) - ${d.status}
          <br>ID: ${d.id}
        </div>
      `).join("");
    })
    .catch(() => alert("Error loading drivers"));
}

// =====================
// ADD DRIVER
// =====================
function addDriver() {
  const name = document.getElementById("name").value;
  const vehicle = document.getElementById("vehicle").value;

  if (!name || !vehicle) {
    alert("Fill all fields");
    return;
  }

  fetch(`${API}/drivers`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ driverName: name, vehicle })
  })
  .then(res => res.json())
  .then(() => {
    alert("Driver added");
    loadDrivers();
  })
  .catch(() => alert("Error adding driver"));
}

// =====================
// BOOK RIDE
// =====================
function bookRide() {
  const rider = document.getElementById("rider").value;
  const pickup = document.getElementById("pickup").value;
  const dropoff = document.getElementById("dropoff").value;
  const driverId = parseInt(document.getElementById("driverId").value);

  if (!rider || !pickup || !dropoff || !driverId) {
    alert("Fill all fields correctly");
    return;
  }

  fetch(`${API}/rides`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ riderName: rider, pickup, dropoff, driverId })
  })
  .then(res => {
      if (!res.ok) throw new Error("Booking failed");
      return res.json();
  })
  .then(() => {
    alert("Ride booked!");
    loadRides();
  })
  .catch(() => alert("Driver not available or invalid ID"));
}

// =====================
// LOAD RIDES
// =====================
function loadRides() {
  fetch(`${API}/rides`)
    .then(res => res.json())
    .then(data => {
      if (data.length === 0) {
        document.getElementById("rides").innerHTML = "No rides yet";
        return;
      }

      document.getElementById("rides").innerHTML = data.map(r => `
        <div class="card">
          Ride #${r.id} - ${r.status}
          <br>Driver ID: ${r.driverId}
          <br>
          <button onclick="updateRide(${r.id}, 'completed')">Complete</button>
          <button onclick="updateRide(${r.id}, 'cancelled')">Cancel</button>
        </div>
      `).join("");
    })
    .catch(() => alert("Error loading rides"));
}

// =====================
// UPDATE RIDE
// =====================
function updateRide(id, status) {
  fetch(`${API}/rides/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ status })
  })
  .then(() => loadRides());
}
</script>

</body>
</html>
