<!DOCTYPE html>
<html>
<head>
  <title>Maxim Ride Viewer</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }
    .card { background: white; padding: 10px; margin: 10px 0; border-radius: 5px; }
    input, button { margin: 5px; padding: 5px; }
  </style>
</head>
<body>

<h1>🚕 Maxim Ride Viewer</h1>

<!-- DRIVERS -->
<h3>Drivers</h3>
<button onclick="loadDrivers()">Load Drivers</button>
<div id="drivers"></div>

<h3>Add Driver</h3>
<input id="name" placeholder="Name">
<input id="vehicle" placeholder="Vehicle">
<button onclick="addDriver()">Add</button>

<!-- RIDES -->
<h3>Book Ride</h3>
<input id="rider" placeholder="Rider Name">
<input id="pickup" placeholder="Pickup">
<input id="dropoff" placeholder="Dropoff">
<input id="driverId" placeholder="Driver ID">
<button onclick="bookRide()">Book</button>

<h3>Rides</h3>
<button onclick="loadRides()">Load Rides</button>
<div id="rides"></div>

<script>

const API = "";

// =====================
// LOAD DRIVERS
// =====================
function loadDrivers() {
  fetch(`${API}/drivers`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("drivers").innerHTML = data.map(d => `
        <div class="card">
          <b>${d.driverName}</b> (${d.vehicle}) - ${d.status}
          <br>ID: ${d.id}
          <br>
          <button onclick="deleteDriver(${d.id})">Delete</button>
        </div>
      `).join("");
    });
}

// =====================
// ADD DRIVER
// =====================
function addDriver() {
  const name = document.getElementById("name").value;
  const vehicle = document.getElementById("vehicle").value;

  if (!name || !vehicle) {
    alert("Fill all fields");
    return;
  }

  fetch(`${API}/drivers`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ driverName: name, vehicle })
  })
  .then(res => {
    if (!res.ok) throw new Error("Failed");
    return res.json();
  })
  .then(() => {
    alert("Driver added!");
    loadDrivers();
  })
  .catch(() => alert("Error adding driver"));
}

// =====================
// DELETE DRIVER (NEW)
// =====================
function deleteDriver(id) {
  if (!confirm("Delete this driver?")) return;

  fetch(`${API}/drivers/${id}`, {
    method: "DELETE"
  })
  .then(res => {
    if (!res.ok) throw new Error("Failed");
    return res.json();
  })
  .then(() => {
    alert("Driver deleted!");
    loadDrivers();
  })
  .catch(() => alert("Error deleting driver"));
}

// =====================
// BOOK RIDE
// =====================
function bookRide() {
  const rider = document.getElementById("rider").value;
  const pickup = document.getElementById("pickup").value;
  const dropoff = document.getElementById("dropoff").value;
  const driverId = parseInt(document.getElementById("driverId").value);

  fetch(`${API}/rides`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ riderName: rider, pickup, dropoff, driverId })
  })
  .then(res => {
    if (!res.ok) throw new Error("Booking failed");
    return res.json();
  })
  .then(() => {
    alert("Ride booked!");
    loadRides();
  })
  .catch(() => alert("Driver not available"));
}

// =====================
// LOAD RIDES
// =====================
function loadRides() {
  fetch(`${API}/rides`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("rides").innerHTML =
        data.length === 0
          ? "No rides yet"
          : data.map(r => `
              <div class="card">
                Ride #${r.id} - ${r.status}
                <br>Driver ID: ${r.driverId}
              </div>
            `).join("");
    });
}

</script>

</body>
</html>
